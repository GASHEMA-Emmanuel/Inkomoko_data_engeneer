# =============================================================================
# Inkomoko Analytics Engineering Pipeline - full stack
# -----------------------------------------------------------------------------
# Services:
#   postgres            OLTP store + Airflow metadata DB
#   clickhouse          OLAP store (analytics)
#   airflow-init        one-shot: db migrate + create admin user
#   airflow-webserver   Airflow UI (http://localhost:8080)
#   airflow-scheduler   runs the DAG (auto-triggers on startup)
#
# Start everything:   docker compose up -d --build
# =============================================================================

name: inkomoko-pipeline

# ----- shared Airflow configuration (anchored, reused by all airflow svcs) ---
x-airflow-common: &airflow-common
  build:
    context: ./airflow
    args:
      AIRFLOW_IMAGE_NAME: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.10.4}
  image: inkomoko/airflow:2.10.4
  env_file:
    - .env
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    # --- connection info consumed by the ingestion/replication scripts ---
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_HTTP_PORT: "8123"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - .:/opt/airflow/project
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
    clickhouse:
      condition: service_healthy

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - OLTP layer (+ Airflow metadata database)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: inkomoko_postgres
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ClickHouse - OLAP layer
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: inkomoko_clickhouse
    environment:
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"   # HTTP interface (used by clickhouse-connect + dbt)
      - "9000:9000"   # native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password $${CLICKHOUSE_PASSWORD} --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Airflow init - run once: migrate metadata DB + create admin user
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: inkomoko_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Airflow webserver - UI
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: inkomoko_airflow_webserver
    command: webserver
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Airflow scheduler - executes the DAG
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: inkomoko_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  clickhouse_data: