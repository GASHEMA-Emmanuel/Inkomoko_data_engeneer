# =============================================================================
# dbt connection profile for ClickHouse (OLAP).
# Values come from environment variables so the same file works inside the
# Airflow container and on a local machine.
#
# "schema" maps to a ClickHouse DATABASE. We build all dbt models into the
# "analytics" database; the replication layer writes the "raw" database.
# =============================================================================
inkomoko:
  target: prod
  outputs:
    prod:
      type: clickhouse
      driver: http                       # use the HTTP interface (port 8123)
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_HTTP_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', '') }}"
      schema: "{{ env_var('CLICKHOUSE_ANALYTICS_DB', 'analytics') }}"
      secure: False
      verify: False
      connect_timeout: 10
      send_receive_timeout: 300
      use_lw_deletes: False
      
      custom_settings:
        allow_experimental_analyzer: 0