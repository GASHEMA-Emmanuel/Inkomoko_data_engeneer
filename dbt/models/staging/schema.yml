version: 2

models:
  - name: stg_users
    description: "Cleaned, de-duplicated users (one row per user_id)."
    columns:
      - name: user_id
        description: "Primary key."
        tests:
          - not_null
          - unique
      - name: email
        description: "Lower-cased, trimmed email."
        tests:
          - not_null

  - name: stg_posts
    description: "Cleaned, de-duplicated posts (one row per post_id)."
    columns:
      - name: post_id
        description: "Primary key."
        tests:
          - not_null
          - unique
      - name: user_id
        description: "Author. Must reference an existing user."
        tests:
          - not_null
          - relationships:
              to: ref('stg_users')
              field: user_id

  - name: stg_comments
    description: "Cleaned, de-duplicated comments (one row per comment_id)."
    columns:
      - name: comment_id
        description: "Primary key."
        tests:
          - not_null
          - unique
      - name: post_id
        description: "Parent post. Must reference an existing post."
        tests:
          - not_null
          - relationships:
              to: ref('stg_posts')
              field: post_id
      - name: commenter_email
        tests:
          - not_null
